services:

# FRONTEND (replaces: npm run dev + cloudflared tunnel)
- type: web
  name: tic-frontend
  runtime: node
  rootDir: frontend
  buildCommand: npm install && npm run build
  startCommand: npm run preview -- --host 0.0.0.0 --port $PORT

# SIGNALING SERVER (replaces: node signaling-server.js)
- type: web
  name: tic-bridge
  runtime: node
  rootDir: bridge
  buildCommand: npm install
  startCommand: node signaling-server.js

# LLM + STT service (replaces: python run.py)
- type: web
  name: tic-llm
  runtime: python
  rootDir: LLM
  buildCommand: |
    pip install -r requirements.txt
    apt-get update && apt-get install -y ffmpeg
  startCommand: python run.py

# ML snapshot service (replaces: python run.py)
- type: web
  name: tic-ml
  runtime: python
  rootDir: ml-service
  buildCommand: pip install -r requirements.txt
  startCommand: python run.py

# background worker (replaces: python bridge.py)
- type: worker
  name: tic-snap-forwarder
  runtime: python
  rootDir: bridge-snaps
  buildCommand: pip install -r requirements.txt
  startCommand: python bridge.py